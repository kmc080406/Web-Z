<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web-Z Liquid Glass Refined</title>

  <script>
    (() => {
      try {
        const saved = localStorage.getItem("webz-theme");
        const prefersDark = window.matchMedia?.("(prefers-color-scheme: dark)").matches;
        document.documentElement.classList.toggle("dark", saved ? saved === "dark" : prefersDark);
      } catch {}
    })();
  </script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700;800&display=swap');

    :root {
      --bg: #eaf3ff;
      --bg2: #f8fbff;
      --text: #06111f;
      --muted: rgba(6, 17, 31, .58);
      --line: rgba(255, 255, 255, .58);
      --line2: rgba(15, 23, 42, .10);
      --panel: rgba(255, 255, 255, .31);
      --panel2: rgba(255, 255, 255, .54);
      --accent: #007aff;
      --accent2: #6d5dfc;
      --accent3: #00c7be;
      --accent4: #ff8bd2;
      --soft: rgba(0, 122, 255, .14);
      --shadow: 0 42px 120px rgba(6, 24, 58, .22);
      --shadow2: 0 22px 62px rgba(6, 24, 58, .15);
      --inner: inset 0 1px 0 rgba(255,255,255,.86), inset 0 -1px 0 rgba(255,255,255,.20);
      --blur: blur(42px) saturate(190%);
    }

    html.dark {
      --bg: #020617;
      --bg2: #07111f;
      --text: #f7fbff;
      --muted: rgba(247, 251, 255, .62);
      --line: rgba(255, 255, 255, .19);
      --line2: rgba(255, 255, 255, .10);
      --panel: rgba(255, 255, 255, .085);
      --panel2: rgba(255, 255, 255, .115);
      --accent: #86c5ff;
      --accent2: #c7b2ff;
      --accent3: #6ff7e9;
      --accent4: #ff9cdc;
      --soft: rgba(134, 197, 255, .16);
      --shadow: 0 44px 130px rgba(0, 0, 0, .62);
      --shadow2: 0 24px 70px rgba(0, 0, 0, .42);
      --inner: inset 0 1px 0 rgba(255,255,255,.24), inset 0 -1px 0 rgba(255,255,255,.07);
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }

    body {
      margin: 0;
      overflow: hidden;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(0, 122, 255, .34), transparent 30rem),
        radial-gradient(circle at 88% 12%, rgba(109, 93, 252, .30), transparent 31rem),
        radial-gradient(circle at 72% 88%, rgba(0, 199, 190, .24), transparent 32rem),
        radial-gradient(circle at 32% 74%, rgba(255, 139, 210, .18), transparent 26rem),
        linear-gradient(135deg, var(--bg), var(--bg2));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
      filter: blur(56px);
      opacity: .74;
      animation: floatGlow 14s ease-in-out infinite alternate;
    }

    body::before {
      width: 42rem; height: 42rem; left: -12rem; bottom: -14rem;
      background:
        radial-gradient(circle, rgba(0, 122, 255, .34), transparent 58%),
        radial-gradient(circle at 70% 35%, rgba(0, 199, 190, .26), transparent 50%);
    }

    body::after {
      width: 38rem; height: 38rem; right: -12rem; top: -12rem;
      background:
        radial-gradient(circle, rgba(109, 93, 252, .34), transparent 58%),
        radial-gradient(circle at 25% 70%, rgba(255, 139, 210, .23), transparent 50%);
      animation-delay: -5s;
    }

    @keyframes floatGlow {
      from { transform: translate3d(-10px, 6px, 0) scale(1); }
      to { transform: translate3d(14px, -12px, 0) scale(1.06); }
    }

    #root { position: relative; z-index: 1; }
    .mono { font-family: "JetBrains Mono", monospace; }
    .muted { color: var(--muted); }

    .glass {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(145deg, rgba(255,255,255,.54), rgba(255,255,255,.16) 45%, rgba(255,255,255,.26)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow2), var(--inner), 0 0 0 1px rgba(255,255,255,.15);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .2s ease, border-color .2s ease, filter .2s ease;
    }

    html.dark .glass {
      background:
        linear-gradient(145deg, rgba(255,255,255,.18), rgba(255,255,255,.045) 48%, rgba(255,255,255,.09)),
        var(--panel);
      box-shadow: var(--shadow2), var(--inner), 0 0 0 1px rgba(255,255,255,.05);
    }

    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(125deg, rgba(255,255,255,.76), transparent 18%, transparent 70%, rgba(255,255,255,.20)),
        radial-gradient(circle at 16% 0%, rgba(255,255,255,.42), transparent 27%),
        linear-gradient(180deg, rgba(255,255,255,.18), transparent);
      opacity: .62;
      mix-blend-mode: screen;
    }

    .glass::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,.28) 18%, transparent 34%),
        radial-gradient(circle at 78% 8%, rgba(255,255,255,.28), transparent 18%);
      opacity: .38;
      transform: translateX(-12%);
    }

    html.dark .glass::before { opacity: .30; }
    html.dark .glass::after { opacity: .18; }
    .glass > * { position: relative; z-index: 1; }

    .glass:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,.78);
      box-shadow: var(--shadow), var(--inner), 0 0 0 1px rgba(255,255,255,.18);
    }

    .hero {
      background:
        linear-gradient(145deg, rgba(255,255,255,.62), rgba(255,255,255,.17) 52%, rgba(255,255,255,.30)),
        radial-gradient(circle at 12% 0%, rgba(0, 122, 255, .25), transparent 48%),
        radial-gradient(circle at 100% 100%, rgba(109, 93, 252, .21), transparent 45%),
        radial-gradient(circle at 78% 12%, rgba(0, 199, 190, .15), transparent 30%),
        var(--panel);
      border-color: rgba(255,255,255,.72);
      box-shadow: var(--shadow), var(--inner), 0 0 0 1px rgba(255,255,255,.18);
    }

    html.dark .hero {
      background:
        linear-gradient(145deg, rgba(255,255,255,.20), rgba(255,255,255,.045) 52%, rgba(255,255,255,.095)),
        radial-gradient(circle at 12% 0%, rgba(134, 197, 255, .24), transparent 48%),
        radial-gradient(circle at 100% 100%, rgba(199, 178, 255, .17), transparent 45%),
        radial-gradient(circle at 78% 12%, rgba(111, 247, 233, .11), transparent 30%),
        var(--panel);
    }

    .tab-active {
      background:
        linear-gradient(135deg, rgba(255,255,255,.54), rgba(255,255,255,.16)),
        linear-gradient(135deg, var(--accent), var(--accent2) 55%, var(--accent3));
      color: white;
      border: 1px solid rgba(255,255,255,.66);
      box-shadow:
        0 22px 52px rgba(0, 122, 255, .30),
        inset 0 1px 0 rgba(255,255,255,.78),
        inset 0 -1px 0 rgba(255,255,255,.22);
    }

    html.dark .tab-active { color: #03101f; }

    button {
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: transform .18s ease, filter .18s ease, opacity .18s ease;
    }

    button:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.06) saturate(1.06); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .brand-dot {
      width: 14px; height: 14px; border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3), var(--accent4));
      box-shadow: 0 0 0 7px var(--soft), 0 14px 34px rgba(0, 122, 255, .30);
      animation: pulseDot 3.2s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { transform: scale(1); filter: saturate(1); }
      50% { transform: scale(1.08); filter: saturate(1.25); }
    }

    .fade { animation: fade .22s cubic-bezier(.2,.8,.2,1); }
    @keyframes fade {
      from { opacity: 0; transform: translateY(10px) scale(.992); filter: blur(3px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    .scrollbar::-webkit-scrollbar { width: 7px; height: 7px; }
    .scrollbar::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .scrollbar::-webkit-scrollbar-track { background: transparent; }

    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .glass, button { background: var(--panel2); }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useCallback, useEffect, useMemo, useRef, useState, memo } = React;

    const CONFIG = {
      name: "Web-Z",
      version: "Liquid Glass Refined",
      tabs: [
        ["Overview", "⌁"],
        ["CPU", "◈"],
        ["Memory", "▣"],
        ["GPU", "▰"],
        ["Network", "◎"],
        ["Display", "▢"],
        ["Browser", "◇"],
        ["Storage", "▤"],
        ["Runtime", "∿"],
        ["Benchmark", "◉"]
      ]
    };

    const isValid = (v) => v !== null && v !== undefined && v !== "" && v !== false && !Number.isNaN(v) && v !== Infinity && v !== -Infinity;
    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const now = () => new Date().toLocaleTimeString();

    const fmt = {
      bytes(value) {
        if (!isValid(value)) return null;
        const units = ["B", "KB", "MB", "GB", "TB"];
        let n = Number(value), i = 0;
        while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
        return `${n.toFixed(i ? 2 : 0)} ${units[i]}`;
      },
      ms(value) {
        return isValid(value) ? `${Math.round(value)} ms` : null;
      },
      sec(value) {
        if (!isValid(value) || value < 0) return null;
        if (value < 60) return `${Math.round(value)}초`;
        if (value < 3600) return `${Math.round(value / 60)}분`;
        return `${(value / 3600).toFixed(1)}시간`;
      },
      mbps(value) {
        return isValid(value) ? `${Number(value).toFixed(2)} Mbps` : null;
      }
    };

    const detect = {
      device() {
        const ua = navigator.userAgent.toLowerCase();
        const touch = navigator.maxTouchPoints || 0;
        if (/ipad|tablet/.test(ua)) return "Tablet";
        if (/mobile|android|iphone|ipod/.test(ua)) return "Mobile";
        if (touch > 1 && Math.min(screen.width, screen.height) > 700) return "Tablet";
        return "PC";
      },
      os() {
        const ua = navigator.userAgent;
        if (/Windows/i.test(ua)) return "Windows";
        if (/Android/i.test(ua)) return "Android";
        if (/iPhone|iPad|iPod/i.test(ua)) return "iOS/iPadOS";
        if (/Mac OS X|Macintosh/i.test(ua)) return "macOS";
        if (/Linux/i.test(ua)) return "Linux";
        return "Unknown";
      },
      browser() {
        const ua = navigator.userAgent;
        if (/Edg\//.test(ua)) return "Edge";
        if (/OPR\//.test(ua)) return "Opera";
        if (/Chrome\//.test(ua)) return "Chrome";
        if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) return "Safari";
        if (/Firefox\//.test(ua)) return "Firefox";
        return "Unknown";
      },
      storage(type) {
        try {
          const store = type === "local" ? localStorage : sessionStorage;
          store.setItem("__webz_test__", "1");
          store.removeItem("__webz_test__");
          return true;
        } catch {
          return false;
        }
      }
    };

    const emptyState = () => ({
      device: { type: detect.device(), os: detect.os(), browser: detect.browser() },
      cpu: {
        cores: navigator.hardwareConcurrency || null,
        architecture: null,
        bitness: null,
        platform: navigator.platform || null,
        platformVersion: null,
        model: null,
        wasm: "WebAssembly" in window,
        worker: "Worker" in window,
        offscreenCanvas: "OffscreenCanvas" in window,
        pressure: { active: false, state: null, source: null }
      },
      memory: {
        deviceMemory: navigator.deviceMemory || null,
        usedHeap: performance.memory?.usedJSHeapSize || null,
        heapLimit: performance.memory?.jsHeapSizeLimit || null
      },
      gpu: {
        webgl: false,
        webgl2: false,
        webgpu: "gpu" in navigator,
        vendor: null,
        renderer: null,
        maxTextureSize: null
      },
      network: {
        online: navigator.onLine,
        supported: !!(navigator.connection || navigator.mozConnection || navigator.webkitConnection),
        downlink: null,
        rtt: null,
        type: null,
        load: null,
        ttfb: null
      },
      display: {},
      browser: {},
      storage: {
        supported: !!navigator.storage?.estimate,
        usage: null,
        quota: null
      },
      battery: {
        supported: false,
        level: null,
        charging: null,
        chargingTime: null,
        dischargingTime: null
      },
      runtime: {
        fps: null,
        longTask: 0,
        webLoad: null,
        opsPerSec: null
      },
      bench: {
        cpuSingle: null,
        cpuMulti: null,
        memory: null,
        storage: null,
        network: null,
        runtime: null,
        overall: null
      }
    });

    const safe = async (fn, fallback = null) => {
      try { return await fn(); } catch { return fallback; }
    };

    function useDiagnosticEngine() {
      const [data, setData] = useState(emptyState);
      const [clock, setClock] = useState(now());
      const [toast, setToast] = useState("");
      const [paused, setPaused] = useState(false);
      const [history, setHistory] = useState({ net: [], fps: [], heap: [], stress: [] });
      const [download, setDownload] = useState(null);
      const [benchUI, setBenchUI] = useState({ running: false, step: "", progress: 0 });

      const pausedRef = useRef(paused);
      const rafRef = useRef(null);
      const stressRef = useRef(false);
      const pressureRef = useRef(null);

      useEffect(() => { pausedRef.current = paused; }, [paused]);

      const patch = useCallback((update) => {
        setData(prev => typeof update === "function" ? update(prev) : ({ ...prev, ...update }));
      }, []);

      const notify = useCallback((message) => {
        setToast(message);
        window.setTimeout(() => setToast(""), 1400);
      }, []);

      const scanView = useCallback(() => {
        patch(prev => ({
          ...prev,
          device: { type: detect.device(), os: detect.os(), browser: detect.browser() },
          network: { ...prev.network, online: navigator.onLine },
          display: {
            resolution: `${screen.width} × ${screen.height}`,
            viewport: `${innerWidth} × ${innerHeight}`,
            dpr: devicePixelRatio,
            colorDepth: `${screen.colorDepth} bit`,
            orientation: screen.orientation?.type || null,
            touch: (navigator.maxTouchPoints || 0) > 0
          },
          browser: {
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            secureContext: window.isSecureContext,
            cookie: navigator.cookieEnabled,
            localStorage: detect.storage("local"),
            sessionStorage: detect.storage("session"),
            indexedDB: "indexedDB" in window,
            clipboard: "clipboard" in navigator,
            serviceWorker: "serviceWorker" in navigator,
            webShare: "share" in navigator
          }
        }));
      }, [patch]);

      const scanStatic = useCallback(async (manual = false) => {
        scanView();

        await safe(async () => {
          const canvas = document.createElement("canvas");
          const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
          const gl2 = canvas.getContext("webgl2");
          const nextGpu = { webgl: !!gl, webgl2: !!gl2, webgpu: "gpu" in navigator };

          if (gl) {
            const dbg = gl.getExtension("WEBGL_debug_renderer_info");
            nextGpu.vendor = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR);
            nextGpu.renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
            nextGpu.maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
          }

          patch(prev => ({ ...prev, gpu: { ...prev.gpu, ...nextGpu } }));
        });

        await safe(async () => {
          if (!navigator.userAgentData?.getHighEntropyValues) return;
          const hints = await navigator.userAgentData.getHighEntropyValues(["architecture", "bitness", "platform", "platformVersion", "model"]);
          patch(prev => ({
            ...prev,
            cpu: {
              ...prev.cpu,
              architecture: hints.architecture || null,
              bitness: hints.bitness || null,
              platform: hints.platform || prev.cpu.platform,
              platformVersion: hints.platformVersion || null,
              model: hints.model || null
            }
          }));
        });

        await safe(async () => {
          if (!navigator.getBattery) return;
          const battery = await navigator.getBattery();
          const updateBattery = () => patch(prev => ({
            ...prev,
            battery: {
              supported: true,
              level: Math.round(battery.level * 100),
              charging: battery.charging,
              chargingTime: battery.chargingTime,
              dischargingTime: battery.dischargingTime
            }
          }));
          updateBattery();
          ["levelchange", "chargingchange", "chargingtimechange", "dischargingtimechange"]
            .forEach(eventName => battery.addEventListener?.(eventName, updateBattery));
        });

        if (manual) notify("Scan complete");
      }, [notify, patch, scanView]);

      const scanLive = useCallback(async () => {
        if (pausedRef.current) return;

        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

        patch(prev => ({
          ...prev,
          network: {
            ...prev.network,
            online: navigator.onLine,
            supported: !!connection,
            downlink: connection?.downlink ?? null,
            rtt: connection?.rtt ?? null,
            type: connection?.effectiveType ?? null
          },
          memory: {
            ...prev.memory,
            usedHeap: performance.memory?.usedJSHeapSize || null,
            heapLimit: performance.memory?.jsHeapSizeLimit || null
          }
        }));

        if (connection?.downlink !== undefined) {
          setHistory(prev => ({ ...prev, net: [...prev.net.slice(-49), connection.downlink || 0] }));
        }

        if (performance.memory?.usedJSHeapSize) {
          setHistory(prev => ({ ...prev, heap: [...prev.heap.slice(-49), performance.memory.usedJSHeapSize / 1024 / 1024] }));
        }

        await safe(async () => {
          if (!navigator.storage?.estimate) return;
          const estimate = await navigator.storage.estimate();
          patch(prev => ({ ...prev, storage: { supported: true, usage: estimate.usage ?? null, quota: estimate.quota ?? null } }));
        });

        const nav = performance.getEntriesByType("navigation")[0];
        if (nav) {
          patch(prev => ({
            ...prev,
            network: {
              ...prev.network,
              load: nav.loadEventEnd ? nav.loadEventEnd - nav.startTime : null,
              ttfb: nav.responseStart ? nav.responseStart - nav.requestStart : null
            }
          }));
        }
      }, [patch]);

      useEffect(() => {
        scanStatic(false);
        scanLive();

        const clockTimer = setInterval(() => setClock(now()), 1000);
        const liveTimer = setInterval(scanLive, 2500);
        const refresh = () => scanView();

        addEventListener("resize", refresh);
        addEventListener("online", refresh);
        addEventListener("offline", refresh);

        return () => {
          clearInterval(clockTimer);
          clearInterval(liveTimer);
          cancelAnimationFrame(rafRef.current);
          pressureRef.current?.disconnect?.();
          stressRef.current = false;
          removeEventListener("resize", refresh);
          removeEventListener("online", refresh);
          removeEventListener("offline", refresh);
        };
      }, [scanLive, scanStatic, scanView]);

      useEffect(() => {
        let frames = 0;
        let last = performance.now();

        const loop = (time) => {
          if (!pausedRef.current) {
            frames++;
            if (time - last >= 1000) {
              const fps = Math.round(frames * 1000 / (time - last));
              patch(prev => ({ ...prev, runtime: { ...prev.runtime, fps } }));
              setHistory(prev => ({ ...prev, fps: [...prev.fps.slice(-49), fps] }));
              frames = 0;
              last = time;
            }
          }
          rafRef.current = requestAnimationFrame(loop);
        };

        rafRef.current = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(rafRef.current);
      }, [patch]);

      useEffect(() => {
        if (!("PerformanceObserver" in window)) return;

        let observer;
        try {
          observer = new PerformanceObserver((list) => {
            if (pausedRef.current) return;
            const total = Math.round(list.getEntries().reduce((sum, entry) => sum + entry.duration, 0));
            if (!total) return;
            patch(prev => ({ ...prev, runtime: { ...prev.runtime, longTask: total } }));
          });
          observer.observe({ entryTypes: ["longtask"] });
        } catch {}

        return () => observer?.disconnect?.();
      }, [patch]);

      const togglePressure = useCallback(async () => {
        if (pressureRef.current) {
          pressureRef.current.disconnect?.();
          pressureRef.current = null;
          patch(prev => ({ ...prev, cpu: { ...prev.cpu, pressure: { active: false, state: null, source: null } } }));
          return;
        }

        if (!("PressureObserver" in window)) {
          notify("Pressure unavailable");
          return;
        }

        try {
          const observer = new PressureObserver((records) => {
            const record = records[records.length - 1];
            patch(prev => ({
              ...prev,
              cpu: {
                ...prev.cpu,
                pressure: { active: true, state: record.state, source: record.source }
              }
            }));
          });

          await observer.observe("cpu", { sampleInterval: 1000 });
          pressureRef.current = observer;
          notify("Pressure started");
        } catch {
          notify("Pressure blocked");
        }
      }, [notify, patch]);

      const toggleStress = useCallback(() => {
        if (stressRef.current) {
          stressRef.current = false;
          patch(prev => ({ ...prev, runtime: { ...prev.runtime, webLoad: null, opsPerSec: null } }));
          return;
        }

        stressRef.current = true;
        setHistory(prev => ({ ...prev, stress: [] }));

        const tick = () => {
          if (!stressRef.current) return;

          const start = performance.now();
          let ops = 0;

          while (performance.now() - start < 140) {
            Math.sqrt((ops * 9301 + 49297) % 233280);
            ops++;
          }

          const opsPerSec = Math.round(ops / 0.14);
          const webLoad = clamp(Math.round((opsPerSec / 4200000) * 100), 1, 100);

          patch(prev => ({ ...prev, runtime: { ...prev.runtime, webLoad, opsPerSec } }));
          setHistory(prev => ({ ...prev, stress: [...prev.stress.slice(-49), webLoad] }));

          setTimeout(tick, 360);
        };

        tick();
      }, [patch]);

      const runBenchmark = useCallback(async () => {
        setBenchUI({ running: true, progress: 0, step: "CPU" });
        await new Promise(resolve => setTimeout(resolve, 70));

        const cpuStart = performance.now();
        let count = 0;
        while (performance.now() - cpuStart < 480) {
          Math.sqrt((count * 1103515245 + 12345) & 0x7fffffff);
          count++;
        }

        const cpuSingle = Math.floor(count / 950);
        const cores = parseInt(data.cpu.cores || 1, 10) || 1;
        const cpuMulti = Math.floor(cpuSingle * Math.min(cores, 8) * 0.72);

        setBenchUI({ running: true, progress: 45, step: "Memory" });
        await new Promise(resolve => setTimeout(resolve, 70));

        const memStart = performance.now();
        const arr = new Float64Array(600000);
        for (let i = 0; i < arr.length; i++) arr[i] = i * 1.25;
        let sum = 0;
        for (let i = 0; i < arr.length; i += 7) sum += arr[i];

        const memory = Math.max(1, Math.floor(100000 / Math.max(performance.now() - memStart, 1)));

        setBenchUI({ running: true, progress: 75, step: "Finish" });
        await new Promise(resolve => setTimeout(resolve, 70));

        let storage = null;
        try {
          const storageStart = performance.now();
          localStorage.setItem("__webz_bench__", "x".repeat(150000));
          localStorage.removeItem("__webz_bench__");
          storage = Math.max(1, Math.floor(25000 / Math.max(performance.now() - storageStart, 1)));
        } catch {}

        const network = data.network.downlink !== null
          ? Math.max(1, Math.floor(data.network.downlink * 100 - (data.network.rtt || 0) * 0.4))
          : null;

        const runtime = data.runtime.fps ? clamp(data.runtime.fps * 2, 1, 200) : null;
        const values = [cpuSingle, cpuMulti, memory, storage, network, runtime].filter(Number.isFinite);
        const overall = Math.round(values.reduce((a, b) => a + b, 0) / Math.max(values.length, 1));

        patch(prev => ({ ...prev, bench: { cpuSingle, cpuMulti, memory, storage, network, runtime, overall } }));
        setBenchUI({ running: false, progress: 100, step: "Done" });
        notify("Benchmark done");
      }, [data, notify, patch]);

      const downloadTest = useCallback(async () => {
        setDownload({ running: true });

        try {
          const start = performance.now();
          const response = await fetch(`${location.href.split("#")[0]}?test=${Date.now()}`, { cache: "no-store" });
          const blob = await response.blob();
          const seconds = (performance.now() - start) / 1000;
          const mbps = (blob.size * 8) / seconds / 1024 / 1024;
          setDownload({ mbps, size: blob.size, seconds });
        } catch {
          setDownload(null);
          notify("Download failed");
        }
      }, [notify]);

      const copyReport = useCallback(async (mode = "text") => {
        if (!navigator.clipboard) {
          notify("Copy unavailable");
          return;
        }

        const report = {
          time: new Date().toLocaleString(),
          device: data.device,
          cpu: { cores: data.cpu.cores, architecture: data.cpu.architecture, bitness: data.cpu.bitness },
          memory: { deviceMemory: data.memory.deviceMemory, usedHeap: data.memory.usedHeap },
          gpu: { renderer: data.gpu.renderer, webgl2: data.gpu.webgl2, webgpu: data.gpu.webgpu },
          network: { online: data.network.online, downlink: data.network.downlink, rtt: data.network.rtt },
          display: data.display,
          runtime: data.runtime,
          benchmark: data.bench
        };

        const text = [
          "Web-Z Diagnostic",
          `Time: ${report.time}`,
          `Device: ${data.device.type} / ${data.device.os} / ${data.device.browser}`,
          `CPU Cores: ${data.cpu.cores ?? "-"}`,
          `RAM: ${data.memory.deviceMemory ? data.memory.deviceMemory + "GB" : "-"}`,
          `GPU: ${data.gpu.renderer ?? "-"}`,
          `Network: ${data.network.downlink ? data.network.downlink + "Mbps" : "-"}`,
          `FPS: ${data.runtime.fps ?? "-"}`,
          `Score: ${data.bench.overall ?? "-"}`
        ].join("\\n");

        await navigator.clipboard.writeText(mode === "json" ? JSON.stringify(report, null, 2) : text);
        notify("Copied");
      }, [data, notify]);

      const clear = useCallback(() => {
        setHistory({ net: [], fps: [], heap: [], stress: [] });
        setDownload(null);
        notify("Cleared");
      }, [notify]);

      return {
        data,
        clock,
        toast,
        paused,
        setPaused,
        history,
        download,
        benchUI,
        scanStatic,
        togglePressure,
        toggleStress,
        runBenchmark,
        downloadTest,
        copyReport,
        clear
      };
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { error: false };
      }

      static getDerivedStateFromError() {
        return { error: true };
      }

      render() {
        if (this.state.error) {
          return (
            <div className="min-h-screen grid place-items-center p-6">
              <div className="glass rounded-[2rem] p-8 max-w-md text-center">
                <h1 className="text-2xl font-black mb-2">Web-Z Error</h1>
                <p className="muted text-sm">브라우저 API 차이로 문제가 발생했습니다. 새로고침해 주세요.</p>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    const Row = memo(({ label, value }) => (
      <div className="flex items-start justify-between gap-4 py-2.5 border-b last:border-b-0" style={{ borderColor: "var(--line2)" }}>
        <span className="muted text-sm font-semibold">{label}</span>
        <span className="text-sm font-bold mono text-right break-all">{String(value)}</span>
      </div>
    ));

    const Rows = memo(({ rows }) => {
      const visible = rows.filter(row => isValid(row.value));
      if (!visible.length) return <p className="muted text-sm">표시할 값이 없습니다.</p>;
      return <div>{visible.map(row => <Row key={row.label} label={row.label} value={row.value} />)}</div>;
    });

    const Badge = memo(({ children }) => (
      <span
        className="inline-flex items-center rounded-full px-2.5 py-1 text-[11px] font-bold"
        style={{
          background: "linear-gradient(135deg, rgba(255,255,255,.32), rgba(255,255,255,.10)), var(--soft)",
          color: "var(--accent)",
          border: "1px solid var(--line)",
          boxShadow: "inset 0 1px 0 rgba(255,255,255,.36)"
        }}
      >
        {children}
      </span>
    ));

    const Button = memo(({ children, onClick, active = false, disabled = false }) => (
      <button
        disabled={disabled}
        onClick={onClick}
        className="rounded-2xl px-4 py-2 text-xs font-black"
        style={{
          background: active
            ? "linear-gradient(135deg, var(--accent), var(--accent2))"
            : "linear-gradient(135deg, rgba(255,255,255,.34), rgba(255,255,255,.12)), var(--panel)",
          border: "1px solid var(--line)",
          color: active ? "white" : "var(--text)"
        }}
      >
        {children}
      </button>
    ));

    const Card = memo(({ title, value, sub, hero = false }) => (
      <div className={`glass ${hero ? "hero" : ""} rounded-[2rem] p-5`}>
        <div className="flex items-center justify-between gap-3 mb-2">
          <p className="muted text-xs font-bold uppercase tracking-wider">{title}</p>
          <span className="w-2 h-2 rounded-full" style={{ background: "linear-gradient(135deg, var(--accent), var(--accent2))" }} />
        </div>
        <h3 className="text-2xl font-black mono leading-tight break-all">{value}</h3>
        {sub && <p className="muted text-xs mt-2 leading-relaxed line-clamp-2">{sub}</p>}
      </div>
    ));

    const Section = memo(({ title, children, right }) => (
      <section className="glass rounded-[2rem] p-5 fade">
        <div className="flex items-center justify-between gap-3 mb-4">
          <h2 className="text-sm font-black uppercase tracking-wider">{title}</h2>
          {right}
        </div>
        {children}
      </section>
    ));

    const Bar = memo(({ label, value, max }) => {
      if (!Number.isFinite(value)) return null;
      const percent = clamp(value / Math.max(max, 1) * 100, 0, 100);

      return (
        <div className="py-2">
          <div className="flex justify-between text-xs mb-1">
            <span className="muted font-bold">{label}</span>
            <span className="mono font-bold">{Math.round(value)}</span>
          </div>
          <div className="h-2 rounded-full overflow-hidden" style={{ background: "rgba(255,255,255,.22)", border: "1px solid var(--line2)" }}>
            <div className="h-full rounded-full transition-all" style={{ width: `${percent}%`, background: "linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3))" }} />
          </div>
        </div>
      );
    });

    const BenchmarkBoard = memo(({ bench, maxScore, onRun, running, step }) => {
      const hasScore = Object.values(bench).some(Number.isFinite);

      return (
        <Section title="Benchmark Results" right={<Button onClick={onRun} disabled={running}>{running ? step : "Run"}</Button>}>
          <div className="grid md:grid-cols-[220px_1fr] gap-5 items-center">
            <div className="glass hero rounded-[2rem] p-5 text-center" style={{ boxShadow: "var(--inner)" }}>
              <p className="muted text-xs font-bold uppercase mb-2">Overall</p>
              <h3 className="text-5xl font-black mono">{running ? "..." : (bench.overall ?? "READY")}</h3>
            </div>
            <div>
              {!hasScore && <p className="muted text-sm">Run을 누르면 주요 성능 점수가 표시됩니다.</p>}
              <Bar label="CPU Single" value={bench.cpuSingle} max={maxScore} />
              <Bar label="CPU Multi" value={bench.cpuMulti} max={maxScore} />
              <Bar label="Memory" value={bench.memory} max={maxScore} />
              <Bar label="Storage" value={bench.storage} max={maxScore} />
              <Bar label="Network" value={bench.network} max={maxScore} />
              <Bar label="Runtime" value={bench.runtime} max={maxScore} />
              <Bar label="Overall" value={bench.overall} max={maxScore} />
            </div>
          </div>
        </Section>
      );
    });

    const LineChart = memo(({ history, title, unit }) => {
      if (!history.length) return null;

      const width = 700;
      const height = 120;
      const max = Math.max(...history, 1);
      const points = history
        .map((value, index) => `${(index / Math.max(history.length - 1, 1)) * width},${height - (value / max) * height}`)
        .join(" ");

      return (
        <Section title={title}>
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-28" preserveAspectRatio="none">
            <polyline points={points} fill="none" stroke="url(#lineGradient)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
            <defs>
              <linearGradient id="lineGradient" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0%" stopColor="var(--accent)" />
                <stop offset="55%" stopColor="var(--accent2)" />
                <stop offset="100%" stopColor="var(--accent3)" />
              </linearGradient>
            </defs>
          </svg>
          <p className="muted text-xs mono mt-1">latest: {Math.round(history.at(-1))}{unit}</p>
        </Section>
      );
    });

    function App() {
      const [tab, setTab] = useState("Overview");
      const [dark, setDark] = useState(() => document.documentElement.classList.contains("dark"));
      const engine = useDiagnosticEngine();
      const data = engine.data;

      useEffect(() => {
        document.documentElement.classList.toggle("dark", dark);
        try { localStorage.setItem("webz-theme", dark ? "dark" : "light"); } catch {}
      }, [dark]);

      const tabs = useMemo(() => {
        const base = [...CONFIG.tabs];
        if (data.battery.supported) base.splice(8, 0, ["Battery", "◌"]);
        return base;
      }, [data.battery.supported]);

      const maxScore = useMemo(() => Math.max(...Object.values(data.bench).filter(Number.isFinite), 100), [data.bench]);
      const storagePercent = data.storage.quota ? clamp((data.storage.usage / data.storage.quota) * 100, 0, 100) : null;

      const apiChips = [
        ["WebGL", data.gpu.webgl],
        ["WebGL2", data.gpu.webgl2],
        ["WebGPU", data.gpu.webgpu],
        ["WASM", data.cpu.wasm],
        ["Worker", data.cpu.worker],
        ["Clipboard", data.browser.clipboard],
        ["IndexedDB", data.browser.indexedDB],
        ["ServiceWorker", data.browser.serviceWorker],
        ["Storage", data.storage.supported],
        ["Battery", data.battery.supported]
      ].filter(([, enabled]) => enabled);

      return (
        <div className="h-screen w-full flex flex-col lg:flex-row overflow-hidden">
          <aside className="glass w-full lg:w-64 shrink-0 p-4 lg:h-screen border-r" style={{ borderColor: "var(--line)" }}>
            <div className="flex items-center justify-between gap-3 mb-7">
              <div className="flex items-center gap-3 min-w-0">
                <span className="brand-dot shrink-0" />
                <div className="min-w-0">
                  <h1 className="text-2xl font-black tracking-tight leading-none">{CONFIG.name}</h1>
                  <p className="muted text-xs font-bold mt-1">{CONFIG.version}</p>
                </div>
              </div>

              <button
                className="rounded-2xl w-10 h-10 font-black shrink-0"
                style={{ border: "1px solid var(--line)", background: "linear-gradient(135deg, rgba(255,255,255,.34), rgba(255,255,255,.10)), var(--panel)" }}
                onClick={() => setDark(value => !value)}
                title="테마 전환"
              >
                {dark ? "☀" : "☾"}
              </button>
            </div>

            <nav className="flex lg:flex-col gap-2 overflow-x-auto lg:overflow-visible scrollbar">
              {tabs.map(([id, icon]) => (
                <button
                  key={id}
                  onClick={() => setTab(id)}
                  className={`shrink-0 rounded-2xl px-4 py-3 text-left text-sm font-black ${tab === id ? "tab-active" : ""}`}
                  style={tab === id ? {} : { color: "var(--muted)", border: "1px solid transparent", background: "transparent" }}
                >
                  <span className="mono mr-2">{icon}</span>{id}
                </button>
              ))}
            </nav>
          </aside>

          <main className="flex-1 overflow-y-auto scrollbar p-4 lg:p-8">
            <header className="glass rounded-[2rem] p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-6">
              <div>
                <h2 className="text-3xl font-black tracking-tight">{tab}</h2>
                <p className="muted text-sm">Liquid Glass Diagnostic · {engine.clock}</p>
              </div>

              <div className="flex gap-2 flex-wrap">
                {engine.toast && <Badge>{engine.toast}</Badge>}
                <Button onClick={() => engine.copyReport("text")}>Copy</Button>
                <Button onClick={() => engine.copyReport("json")}>JSON</Button>
                <Button onClick={() => engine.scanStatic(true)}>Scan</Button>
                <Button onClick={() => engine.setPaused(value => !value)} active={!engine.paused}>{engine.paused ? "Live Off" : "Live On"}</Button>
                <Button onClick={engine.clear}>Clear</Button>
              </div>
            </header>

            <div className="max-w-6xl space-y-5 fade">
              {tab === "Overview" && (
                <>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <Card hero title="Device" value={data.device.type} sub={`${data.device.os} / ${data.device.browser}`} />
                    {isValid(data.cpu.cores) && <Card title="CPU" value={data.cpu.cores} sub="logical cores" />}
                    {isValid(data.memory.deviceMemory) && <Card title="Memory" value={`${data.memory.deviceMemory}GB`} sub="estimated" />}
                    {isValid(data.gpu.renderer) && <Card title="GPU" value="Detected" sub={data.gpu.renderer} />}
                    {isValid(data.network.downlink) && <Card title="Network" value={`${data.network.downlink}Mbps`} sub={data.network.type} />}
                    {isValid(data.runtime.fps) && <Card title="FPS" value={data.runtime.fps} sub="current page" />}
                    {isValid(data.bench.overall) && <Card hero title="Score" value={data.bench.overall} sub="benchmark overall" />}
                    {data.network.online && <Card title="Status" value="Online" sub="connection" />}
                  </div>

                  <BenchmarkBoard
                    bench={data.bench}
                    maxScore={maxScore}
                    onRun={engine.runBenchmark}
                    running={engine.benchUI.running}
                    step={engine.benchUI.step}
                  />

                  <Section title="Available APIs">
                    <div className="flex flex-wrap gap-2">
                      {apiChips.map(([name]) => <Badge key={name}>{name}</Badge>)}
                    </div>
                  </Section>
                </>
              )}

              {tab === "CPU" && (
                <>
                  <Section title="CPU">
                    <Rows rows={[
                      { label: "Logical cores", value: data.cpu.cores },
                      { label: "Architecture", value: data.cpu.architecture },
                      { label: "Bitness", value: data.cpu.bitness },
                      { label: "Platform", value: data.cpu.platform },
                      { label: "Platform version", value: data.cpu.platformVersion },
                      { label: "Model", value: data.cpu.model },
                      { label: "CPU pressure", value: data.cpu.pressure.state }
                    ]} />
                  </Section>

                  <Section title="CPU Tools" right={<Button onClick={engine.togglePressure}>{data.cpu.pressure.active ? "Stop Pressure" : "Start Pressure"}</Button>}>
                    <div className="grid md:grid-cols-3 gap-4 mb-4">
                      {isValid(data.runtime.opsPerSec) && <Card title="Ops/s" value={data.runtime.opsPerSec.toLocaleString()} />}
                      {isValid(data.runtime.webLoad) && <Card title="Web Load" value={`${data.runtime.webLoad}%`} />}
                      {isValid(data.cpu.pressure.state) && <Card title="Pressure" value={data.cpu.pressure.state} />}
                    </div>
                    <Button onClick={engine.toggleStress} active={isValid(data.runtime.webLoad)}>{isValid(data.runtime.webLoad) ? "Stop Web Load" : "Start Web Load"}</Button>
                  </Section>
                </>
              )}

              {tab === "Memory" && (
                <>
                  <Section title="Memory">
                    <Rows rows={[
                      { label: "RAM estimate", value: isValid(data.memory.deviceMemory) ? `${data.memory.deviceMemory} GB` : null },
                      { label: "JS heap used", value: fmt.bytes(data.memory.usedHeap) },
                      { label: "JS heap limit", value: fmt.bytes(data.memory.heapLimit) },
                      { label: "Memory score", value: data.bench.memory }
                    ]} />
                  </Section>
                  <LineChart history={engine.history.heap} title="Heap History" unit="MB" />
                </>
              )}

              {tab === "GPU" && (
                <Section title="GPU">
                  <Rows rows={[
                    { label: "Renderer", value: data.gpu.renderer },
                    { label: "Vendor", value: data.gpu.vendor },
                    { label: "WebGL2", value: data.gpu.webgl2 ? "enabled" : null },
                    { label: "WebGPU", value: data.gpu.webgpu ? "enabled" : null },
                    { label: "Max texture", value: data.gpu.maxTextureSize }
                  ]} />
                </Section>
              )}

              {tab === "Network" && (
                <>
                  <Section title="Network" right={<Button onClick={engine.downloadTest}>Test</Button>}>
                    <Rows rows={[
                      { label: "Status", value: data.network.online ? "Online" : null },
                      { label: "Type", value: data.network.type },
                      { label: "Downlink", value: isValid(data.network.downlink) ? `${data.network.downlink} Mbps` : null },
                      { label: "RTT", value: isValid(data.network.rtt) ? `${data.network.rtt} ms` : null },
                      { label: "Load", value: fmt.ms(data.network.load) },
                      { label: "TTFB", value: fmt.ms(data.network.ttfb) }
                    ]} />
                  </Section>

                  {engine.download && (
                    <Section title="Download">
                      {engine.download.running ? (
                        <p className="muted text-sm">측정 중...</p>
                      ) : (
                        <Rows rows={[
                          { label: "Speed", value: fmt.mbps(engine.download.mbps) },
                          { label: "Size", value: fmt.bytes(engine.download.size) },
                          { label: "Time", value: isValid(engine.download.seconds) ? `${engine.download.seconds.toFixed(2)}s` : null }
                        ]} />
                      )}
                    </Section>
                  )}

                  <LineChart history={engine.history.net} title="Network History" unit="Mbps" />
                </>
              )}

              {tab === "Display" && (
                <Section title="Display">
                  <Rows rows={[
                    { label: "Resolution", value: data.display.resolution },
                    { label: "Viewport", value: data.display.viewport },
                    { label: "DPR", value: data.display.dpr },
                    { label: "Color depth", value: data.display.colorDepth },
                    { label: "Orientation", value: data.display.orientation },
                    { label: "Touch", value: data.display.touch ? "enabled" : null }
                  ]} />
                </Section>
              )}

              {tab === "Browser" && (
                <>
                  <Section title="Browser">
                    <Rows rows={[
                      { label: "Language", value: data.browser.language },
                      { label: "Timezone", value: data.browser.timezone },
                      { label: "Secure context", value: data.browser.secureContext ? "yes" : null },
                      { label: "Cookie", value: data.browser.cookie ? "enabled" : null }
                    ]} />
                  </Section>

                  <Section title="Available APIs">
                    <div className="flex flex-wrap gap-2">
                      {apiChips.map(([name]) => <Badge key={name}>{name}</Badge>)}
                    </div>
                  </Section>
                </>
              )}

              {tab === "Storage" && (
                <Section title="Storage">
                  <Rows rows={[
                    { label: "Usage", value: fmt.bytes(data.storage.usage) },
                    { label: "Quota", value: fmt.bytes(data.storage.quota) },
                    { label: "Used", value: isValid(storagePercent) ? `${storagePercent.toFixed(2)}%` : null },
                    { label: "Storage score", value: data.bench.storage }
                  ]} />
                  {isValid(storagePercent) && (
                    <div className="mt-4 h-2 rounded-full overflow-hidden" style={{ background: "rgba(255,255,255,.22)", border: "1px solid var(--line2)" }}>
                      <div className="h-full rounded-full" style={{ width: `${storagePercent}%`, background: "linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3))" }} />
                    </div>
                  )}
                </Section>
              )}

              {tab === "Battery" && (
                <Section title="Battery">
                  <Rows rows={[
                    { label: "Level", value: isValid(data.battery.level) ? `${data.battery.level}%` : null },
                    { label: "Charging", value: data.battery.charging ? "yes" : "no" },
                    { label: "Charging time", value: fmt.sec(data.battery.chargingTime) },
                    { label: "Discharging time", value: fmt.sec(data.battery.dischargingTime) }
                  ]} />
                </Section>
              )}

              {tab === "Runtime" && (
                <>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    {isValid(data.runtime.fps) && <Card title="FPS" value={data.runtime.fps} />}
                    {isValid(data.runtime.longTask) && <Card title="Long Task" value={`${data.runtime.longTask}ms`} />}
                    {isValid(data.runtime.webLoad) && <Card title="Web Load" value={`${data.runtime.webLoad}%`} />}
                    {isValid(data.runtime.opsPerSec) && <Card title="Ops/s" value={data.runtime.opsPerSec.toLocaleString()} />}
                  </div>

                  <Section title="Runtime Control">
                    <Button onClick={engine.toggleStress} active={isValid(data.runtime.webLoad)}>{isValid(data.runtime.webLoad) ? "Stop Web Load" : "Start Web Load"}</Button>
                  </Section>

                  <LineChart history={engine.history.fps} title="FPS History" unit="fps" />
                  <LineChart history={engine.history.stress} title="Web Load History" unit="%" />
                </>
              )}

              {tab === "Benchmark" && (
                <BenchmarkBoard
                  bench={data.bench}
                  maxScore={maxScore}
                  onRun={engine.runBenchmark}
                  running={engine.benchUI.running}
                  step={engine.benchUI.step}
                />
              )}
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
  </script>
</body>
</html>
