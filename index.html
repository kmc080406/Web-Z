<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Z Pro | Final Peak Diagnostic</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --bg: #010409; --card: rgba(13, 17, 23, 0.95); --border: #30363d; --blue: #2563eb; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: #e2e8f0; margin: 0; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .tab-active { background: var(--blue) !important; color: white !important; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
        .card-bg { background: var(--card); border: 1px solid var(--border); backdrop-filter: blur(16px); }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; height: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        .glow-blue { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
        .content-fade { animation: fadeIn 0.12s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, memo, useRef } = React;

        /**
         * [High Performance Component: Icon]
         */
        const Icon = memo(({ name, size = 14, className = "" }) => {
            const paths = {
                'dash': "M3 3h7v9H3zm11 0h7v5h-7zm0 9h7v9h-7zm-11 10h7v5H3z",
                'cpu': "M2 9h4m12 0h4M9 2v4m6-4v4M9 18v4m6-4v4M6 5h12a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z M9 9h6v6H9Z",
                'mem': "M12 3c-4.4 0-8 1.8-8 4s3.6 4 8 4 8-1.8 8-4-3.6-4-8-4Z M4 7v10c0 2.2 3.6 4 8 4s8-1.8 8-4V7",
                'gpu': "M13 2 L3 14h9l-1 8 10-12h-9l1-8z",
                'net': "M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z M12 2v20 M2 12h20",
                'disp': "M2 3h20v14H2zm6 18h8m-4-4v4",
                'sw': "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M19.4 15a1.65 1.65 0 0 0 .33 1.82",
                'disk': "M3 10h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V10zm3 4h.01M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4H3V6z",
                'batt': "M6 7H2v10h4M18 7h4v10h-4 M6 5h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6",
                'bench': "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zm-2-13.5l6 3.5-6 3.5v-7z"
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d={paths[name] || ""} />
                </svg>
            );
        });

        /**
         * [Data Presentation Component: InfoRow]
         */
        const InfoRow = memo(({ label, value, isRaw = false, status = "ok" }) => {
            const getBadge = () => {
                if (isRaw) return { l: "RAW", c: "bg-blue-900/40 text-blue-300 border-blue-700/50" };
                if (status === "no" || value === 'N/A' || !value) return { l: "차단", c: "bg-rose-500/10 text-rose-400 border-rose-500/20" };
                return { l: "정상", c: "bg-emerald-500/10 text-emerald-400 border-emerald-500/20" };
            };
            const b = getBadge();
            return (
                <div className="flex justify-between items-center py-2 border-b border-white/[0.04] last:border-0 px-2 hover:bg-white/[0.02] transition-colors">
                    <span className="text-slate-500 text-[10px] font-bold uppercase tracking-tight">{label}</span>
                    <div className="flex items-center gap-2 overflow-hidden ml-4">
                        <span className={`text-[11px] mono text-slate-200 truncate max-w-[160px] md:max-w-xs ${isRaw ? 'text-blue-400 font-bold italic' : ''}`}>{value || 'N/A'}</span>
                        <span className={`text-[8px] px-1.5 py-0.5 rounded border font-black uppercase tracking-tighter ${b.c}`}>{b.l}</span>
                    </div>
                </div>
            );
        });

        /**
         * [High Frequency Component: NetworkVisualizer]
         */
        const NetworkVisualizer = memo(({ history }) => {
            const max = Math.max(...history, 5);
            const width = 600, height = 100;
            const points = history.map((val, i) => `${(i / Math.max(history.length - 1, 1)) * width},${height - (val / max) * height}`).join(' ');
            return (
                <div className="card-bg p-4 rounded-xl h-40 border-blue-500/10 content-fade">
                    <p className="text-[9px] font-black text-blue-500 mb-3 uppercase tracking-widest flex items-center gap-2">
                        <span className="w-1.5 h-1.5 bg-blue-600 rounded-full animate-pulse"></span>
                        Real-time Bandwidth (Mbps)
                    </p>
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-24" preserveAspectRatio="none">
                        <path d={`M 0 ${height} L ${points} L ${width} ${height} Z`} fill="rgba(37, 99, 235, 0.1)" />
                        <polyline fill="none" stroke="#3b82f6" strokeWidth="2.5" points={points} strokeLinejoin="round" />
                    </svg>
                </div>
            );
        });

        /**
         * [Main Application Logic]
         */
        function App() {
            const [activeTab, setActiveTab] = useState('Overview');
            const [netHistory, setNetHistory] = useState([0]);
            const [benchRunning, setBenchRunning] = useState(false);
            const isMounted = useRef(true);
            const [sys, setSys] = useState({
                cores: navigator.hardwareConcurrency || '?',
                memory: navigator.deviceMemory || '?',
                gpu: '-', battery: { level: 0, charging: false },
                network: { downlink: 0, rtt: 0, type: '-', saveData: false },
                storage: { usage: 0, quota: 0 },
                hints: { arch: '-', model: '-', platform: '-' },
                score: 0
            });

            useEffect(() => {
                isMounted.current = true;
                const scanStatic = async () => {
                    // GPU Info
                    const gl = document.createElement('canvas').getContext('webgl');
                    if (gl) {
                        const dbg = gl.getExtension('WEBGL_debug_renderer_info');
                        const renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : 'Generic';
                        setSys(p => ({ ...p, gpu: renderer }));
                    }
                    // High Entropy Hints (Chromium Only)
                    if (navigator.userAgentData?.getHighEntropyValues) {
                        const h = await navigator.userAgentData.getHighEntropyValues(['architecture', 'model', 'platformVersion']);
                        setSys(p => ({ ...p, hints: { arch: h.architecture||'-', model: h.model||'-', platform: h.platformVersion||'-' } }));
                    }
                    // Battery API
                    if (navigator.getBattery) {
                        const bat = await navigator.getBattery();
                        const update = () => { if(isMounted.current) setSys(p => ({ ...p, battery: { level: Math.round(bat.level * 100), charging: bat.charging }})); };
                        update(); bat.onlevelchange = update; bat.onchargingchange = update;
                    }
                };
                scanStatic();
                runBenchmark();

                const tick = setInterval(() => {
                    if (navigator.connection) {
                        const n = navigator.connection;
                        setSys(p => ({ ...p, network: { downlink: n.downlink||0, rtt: n.rtt||0, type: n.effectiveType, saveData: !!n.saveData }}));
                        setNetHistory(prev => [...prev.slice(-39), n.downlink || 0]);
                    }
                    if (navigator.storage?.estimate) {
                        navigator.storage.estimate().then(est => setSys(p => ({ ...p, storage: { usage: est.usage||0, quota: est.quota||0 } })));
                    }
                }, 2000);

                return () => { isMounted.current = false; clearInterval(tick); };
            }, []);

            const runBenchmark = useCallback(() => {
                setBenchRunning(true);
                setTimeout(() => {
                    const start = performance.now();
                    let count = 0; while(performance.now() - start < 450) { Math.sqrt(Math.random()); count++; }
                    if(isMounted.current) {
                        setSys(p => ({ ...p, score: Math.floor(count / 12 + (parseInt(p.cores) || 1) * 15) }));
                        setBenchRunning(false);
                    }
                }, 100);
            }, [sys.cores]);

            const TABS = [
                { id: 'Overview', icon: 'dash' }, { id: 'CPU', icon: 'cpu' }, { id: 'Memory', icon: 'mem' }, 
                { id: 'GPU', icon: 'gpu' }, { id: 'Network', icon: 'net' }, { id: 'Display', icon: 'disp' }, 
                { id: 'Browser', icon: 'sw' }, { id: 'Storage', icon: 'disk' }, { id: 'Battery', icon: 'batt' }, 
                { id: 'Benchmark', icon: 'bench' }
            ];

            return (
                <div className="flex flex-col lg:flex-row h-screen w-full bg-[#010409] overflow-hidden">
                    {/* Ultra Slim Sidebar */}
                    <aside className="w-full lg:w-40 bg-[#0d1117] border-r border-[#30363d] p-2 flex flex-col shrink-0 z-50">
                        <div className="flex items-center gap-2 mb-6 px-2 shrink-0">
                            <div className="bg-blue-600 p-1.5 rounded-lg shadow-lg">
                                <Icon name="cpu" size={16} className="text-white" />
                            </div>
                            <h1 className="text-lg font-black text-white italic tracking-tighter leading-none glow-blue italic">WEB-Z</h1>
                        </div>
                        <nav className="flex lg:flex-col gap-0.5 overflow-x-auto lg:overflow-visible custom-scrollbar">
                            {TABS.map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)}
                                    className={`flex items-center gap-2.5 px-3 py-1.5 rounded-lg text-[10px] font-bold transition-all shrink-0 uppercase tracking-tighter ${activeTab === t.id ? 'tab-active' : 'text-slate-500 hover:bg-white/[0.03]'}`}>
                                    <Icon name={t.icon} size={13} />
                                    {t.id}
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto pt-4 text-center opacity-10">
                            <p className="text-[7px] font-bold uppercase tracking-[0.3em]">v9.0 Ultra Slim</p>
                        </div>
                    </aside>

                    {/* Content Viewport */}
                    <main className="flex-1 overflow-y-auto p-4 lg:p-6 bg-[#010409] custom-scrollbar">
                        <header className="mb-6 flex justify-between items-center border-b border-[#30363d] pb-2">
                            <h2 className="text-2xl font-black italic uppercase text-white tracking-tighter leading-none glow-blue italic">{activeTab}</h2>
                            <div className="text-[9px] mono text-slate-500 font-bold bg-[#0d1117] px-2 py-0.5 rounded border border-[#30363d]">
                                {new Date().toLocaleTimeString()} / KERNEL_STABLE
                            </div>
                        </header>

                        <div className="max-w-4xl space-y-4 content-fade">
                            {activeTab === 'Overview' && (
                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                        {[ ['CORES', sys.cores, 'blue'], ['MEMORY', sys.memory+'G', 'emerald'], ['BAND', sys.network.downlink+'M', 'amber'], ['POWER', sys.battery.level+'%', 'indigo'] ].map(([l, v, c]) => (
                                            <div key={l} className="card-bg px-4 py-3 rounded-xl border-t-2 border-slate-700">
                                                <p className="text-[8px] text-slate-500 font-black mb-0.5 tracking-tighter">{l}</p>
                                                <h4 className="text-2xl font-black text-white leading-none">{v}</h4>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="card-bg p-8 rounded-[2.5rem] border-blue-500/20 border text-center">
                                        <p className="text-[9px] font-black text-blue-500 uppercase mb-2 tracking-[0.4em]">Synthetic Run Index</p>
                                        <div className="text-8xl font-black text-white tracking-tighter leading-none glow-blue italic">
                                            {benchRunning ? '...' : sys.score}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'CPU' && (
                                <div className="card-bg rounded-xl p-3">
                                    <InfoRow label="Thread Count" value={sys.cores + " Logical"} />
                                    <InfoRow label="Architecture" value={sys.hints.arch} isRaw />
                                    <InfoRow label="Platform Name" value={navigator.platform} isRaw />
                                    <InfoRow label="Device Model" value={sys.hints.model} isRaw />
                                    <InfoRow label="User Agent" value={navigator.userAgent} isRaw />
                                </div>
                            )}

                            {activeTab === 'Memory' && (
                                <div className="card-bg rounded-xl p-3">
                                    <InfoRow label="Physical Estimate" value={sys.memory + " GB"} />
                                    <InfoRow label="Used JS Heap" value={window.performance?.memory ? (performance.memory.usedJSHeapSize / 1e6).toFixed(2) + " MB" : "N/A"} />
                                    <InfoRow label="Allocated Limit" value={window.performance?.memory ? (performance.memory.jsHeapSizeLimit / 1e6).toFixed(0) + " MB" : "N/A"} isRaw />
                                </div>
                            )}

                            {activeTab === 'GPU' && (
                                <div className="card-bg rounded-xl p-3">
                                    <InfoRow label="Primary Renderer" value={sys.gpu} />
                                    <InfoRow label="WebGPU Support" value={navigator.gpu ? "Enabled" : "Disabled"} status={navigator.gpu ? 'ok' : 'no'} />
                                    <InfoRow label="Driver Model" value="OpenGL ES (WebGL 2.0)" />
                                </div>
                            )}

                            {activeTab === 'Network' && (
                                <div className="space-y-4">
                                    <div className="card-bg rounded-xl p-3">
                                        <InfoRow label="Downlink Speed" value={sys.network.downlink + " Mbps"} />
                                        <InfoRow label="Latency (RTT)" value={sys.network.rtt + " ms"} />
                                        <InfoRow label="Save Data" value={sys.network.saveData ? "ON" : "OFF"} />
                                        <InfoRow label="Protocol" value={sys.network.type} isRaw />
                                    </div>
                                    <NetworkVisualizer history={netHistory} />
                                </div>
                            )}

                            {activeTab === 'Storage' && (
                                <div className="card-bg rounded-xl p-4">
                                    <InfoRow label="Estimated Quota" value={(sys.storage.quota / 1e9).toFixed(2) + " GB"} />
                                    <InfoRow label="Actual Usage" value={(sys.storage.usage / 1e6).toFixed(2) + " MB"} />
                                    <div className="w-full bg-[#010409] h-1.5 rounded-full mt-6 overflow-hidden">
                                        <div className="bg-blue-600 h-full transition-all duration-700" style={{width: (sys.storage.usage/sys.storage.quota*100)+'%'}}></div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'Battery' && (
                                <div className="card-bg rounded-xl p-10 text-center">
                                    <div className="text-7xl font-black text-white glow-blue mb-4 leading-none tracking-tighter">{sys.battery.level}%</div>
                                    <InfoRow label="Status" value={sys.battery.charging ? "Connected / Charging" : "Discharging"} />
                                </div>
                            )}

                            {activeTab === 'Benchmark' && (
                                <div className="card-bg p-10 rounded-[2.5rem] border-blue-500/30 border text-center">
                                    <h3 className="text-3xl font-black italic text-blue-500 mb-6 tracking-widest uppercase">Benchmark Pro</h3>
                                    <div className="text-[7rem] font-black text-white tracking-tighter leading-none mb-10 glow-blue italic">{sys.score}</div>
                                    <button onClick={runBenchmark} disabled={benchRunning} className="bg-blue-600 px-10 py-3 rounded-xl font-black uppercase text-[10px] tracking-[0.2em] shadow-xl hover:bg-blue-500 transition-all disabled:opacity-30">Run Diagnostic</button>
                                </div>
                            )}

                            {['Display', 'Browser'].includes(activeTab) && (
                                <div className="card-bg rounded-xl p-3">
                                    {activeTab === 'Display' && <><InfoRow label="Resolution" value={screen.width+"x"+screen.height}/><InfoRow label="Pixel Ratio" value={window.devicePixelRatio} isRaw/><InfoRow label="Color Depth" value={screen.colorDepth+"-bit"}/></>}
                                    {activeTab === 'Browser' && <><InfoRow label="Main Language" value={navigator.language}/><InfoRow label="Cookie Status" value={navigator.cookieEnabled?"ON":"OFF"}/><InfoRow label="Engine Product" value={navigator.product} isRaw/></>}
                                </div>
                            )}
                        </div>

                        <footer className="mt-12 opacity-10 text-[8px] font-black uppercase tracking-[1em] text-center pb-12 italic">
                            HARDWARE_VERIFIED_DIAGNOSTIC_V9_PEAK
                        </footer>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
