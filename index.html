========================= */
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, message: "" };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, message: error?.message || "알 수 없는 오류" };
  }
  componentDidCatch(error, info) {
    console.error("[Web-Z Error]", error, info);
  }
  render() {
    if (!this.state.hasError) return this.props.children;
    return (
      <div className="min-h-screen w-full flex items-center justify-center p-6">
        <div className="card-bg max-w-lg w-full p-6 text-center">
          <h1 className="text-4xl font-black mb-3">WEB-Z 오류 노트</h1>

const isBad = (v) => v === null || v === undefined || v === "" || Number.isNaN(v) || v === Infinity || v === -Infinity;
const val = (v, fallback = "N/A") => isBad(v) ? fallback : v;
const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
const now = () => new Date().toLocaleTimeString();
const yesNo = (v) => v ? "ON" : "OFF";
const support = (v) => v ? "지원" : "미지원";
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
const safeRun = async (fn, fallback = null) => {
  try { return await fn(); } catch { return fallback; }
};
const fmtBytes = (bytes) => {
  if (isBad(bytes)) return "측정 불가";
  const units = ["B", "KB", "MB", "GB", "TB"];
  let n = Number(bytes), i = 0;
  while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
  return `${n.toFixed(i === 0 ? 0 : 2)} ${units[i]}`;
};
const fmtMs = (ms) => isBad(ms) ? "측정 불가" : `${Math.round(ms)} ms`;
const fmtSec = (sec) => {
  if (isBad(sec) || sec === Infinity || sec < 0) return "알 수 없음";
  if (sec < 60) return `${Math.round(sec)}초`;
  if (sec < 3600) return `${Math.round(sec / 60)}분`;
  return `${(sec / 3600).toFixed(1)}시간`;
};

const detect = {
  deviceType() {
    const ua = navigator.userAgent.toLowerCase();
    const minSide = Math.min(screen.width, screen.height);
    if (/ipad|tablet/.test(ua)) return "Tablet";
    if (/mobile|android|iphone|ipod/.test(ua)) return "Mobile";
    if ((navigator.maxTouchPoints || 0) > 1 && minSide > 700) return "Tablet";
    return "PC";
  },
  os() {
    const ua = navigator.userAgent;
    if (/Windows/i.test(ua)) return "Windows";
    if (/Android/i.test(ua)) return "Android";
    if (/iPhone|iPad|iPod/i.test(ua)) return "iOS/iPadOS";
    if (/Mac OS X|Macintosh/i.test(ua)) return "macOS";
    if (/Linux/i.test(ua)) return "Linux";
    return "Unknown";
  },
  browser() {
    const ua = navigator.userAgent;
    if (/Edg\//.test(ua)) return "Microsoft Edge";
    if (/OPR\//.test(ua)) return "Opera";
    if (/Chrome\//.test(ua) && !/Edg\//.test(ua)) return "Chrome/Chromium";
    if (/Safari\//.test(ua) && !/Chrome\//.test(ua)) return "Safari";
    if (/Firefox\//.test(ua)) return "Firefox";
    return "Unknown";
  },
  storageWorks(type) {
    try {
      const store = type === "local" ? localStorage : sessionStorage;
      store.setItem("__webz_test__", "1");
      store.removeItem("__webz_test__");
      return true;
    } catch { return false; }
  }
};

    network: "M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z M12 2v20 M2 12h20",

    storage: "M3 10h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V10zm3 4h.01M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v4H3V6z",

/* =========================
   DIAGNOSTIC ENGINE
========================= */
function useDiagnosticEngine() {
  const [data, setData] = useState(initialState);
  const [clock, setClock] = useState(now());
  const [toast, setToast] = useState("");
  const [log, setLog] = useState([]);
  const [history, setHistory] = useState({ net: [], fps: [], heap: [], longTask: [], stress: [] });
  const [download, setDownload] = useState(null);
  const [benchUI, setBenchUI] = useState({ running: false, progress: 0, step: "대기" });
  const [livePaused, setLivePaused] = useState(false);
  const livePausedRef = useRef(false);
  const stressRef = useRef(false);
  const rafRef = useRef(null);
  const pressureObserverRef = useRef(null);

  useEffect(() => {
    livePausedRef.current = livePaused;
  }, [livePaused]);

  const patch = useCallback((updater) => {
    setData(prev => typeof updater === "function" ? updater(prev) : ({ ...prev, ...updater }));
  }, []);
  const notify = useCallback((msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 1700);
  }, []);
  const addLog = useCallback((msg) => {
    setLog(prev => [{ time: now(), msg }, ...prev].slice(0, 8));
  }, []);

  const scanDisplayBrowser = useCallback(() => {
    patch(prev => ({
      ...prev,
      measuredAt: new Date().toISOString(),
      device: { type: detect.deviceType(), os: detect.os(), browser: detect.browser() },
      network: { ...prev.network, online: navigator.onLine },
      display: {
        width: screen.width, height: screen.height, availWidth: screen.availWidth, availHeight: screen.availHeight,
        innerWidth, innerHeight, outerWidth, outerHeight,
        dpr: devicePixelRatio, colorDepth: screen.colorDepth, pixelDepth: screen.pixelDepth,
        orientationType: screen.orientation?.type || null,
        orientationAngle: screen.orientation?.angle ?? null,
        darkMode: matchMedia("(prefers-color-scheme: dark)").matches,
        reducedMotion: matchMedia("(prefers-reduced-motion: reduce)").matches,
        hover: matchMedia("(hover: hover)").matches,
        pointerFine: matchMedia("(pointer: fine)").matches,
        maxTouchPoints: navigator.maxTouchPoints || 0,
        touch: ("ontouchstart" in window) || (navigator.maxTouchPoints > 0)
      },
      browser: {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        vendor: navigator.vendor,
        product: navigator.product,
        language: navigator.language,
        languages: Array.from(navigator.languages || []).join(", "),
        timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        cookieEnabled: navigator.cookieEnabled,
        doNotTrack: navigator.doNotTrack || window.doNotTrack || null,
        localStorage: detect.storageWorks("local"),
        sessionStorage: detect.storageWorks("session"),
        indexedDB: "indexedDB" in window,
        cacheAPI: "caches" in window,
        serviceWorker: "serviceWorker" in navigator,
        clipboard: "clipboard" in navigator,
        webShare: "share" in navigator,
        wasm: "WebAssembly" in window,
        worker: "Worker" in window,
        webgl: prev.gpu.webgl,
        webgpu: prev.gpu.webgpu,
        secureContext: window.isSecureContext
      }
    }));
  }, [patch]);

  const scanStatic = useCallback(async (manual = false) => {
    scanDisplayBrowser();

    await safeRun(async () => {
      const canvas = document.createElement("canvas");
      const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
      const gl2 = canvas.getContext("webgl2");
      const gpu = { webgl: !!gl, webgl2: !!gl2, webgpu: "gpu" in navigator };
      if (gl) {
        const dbg = gl.getExtension("WEBGL_debug_renderer_info");
        gpu.vendor = dbg ? gl.getParameter(dbg.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR);
        gpu.renderer = dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER);
        gpu.note = dbg ? "상세 렌더러 표시 가능" : "브라우저가 GPU 상세 정보를 숨길 수 있음";
        gpu.version = gl.getParameter(gl.VERSION);
        gpu.shading = gl.getParameter(gl.SHADING_LANGUAGE_VERSION);
        gpu.maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);
        gpu.maxRenderbufferSize = gl.getParameter(gl.MAX_RENDERBUFFER_SIZE);
        gpu.maxVertexAttribs = gl.getParameter(gl.MAX_VERTEX_ATTRIBS);
        gpu.maxTextureUnits = gl.getParameter(gl.MAX_COMBINED_TEXTURE_IMAGE_UNITS);
        gpu.extensions = gl.getSupportedExtensions?.() || [];
      }
      patch(p => ({ ...p, gpu: { ...p.gpu, ...gpu } }));
    });

    await safeRun(async () => {
      if (!navigator.gpu?.requestAdapter) return;
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) return;
      patch(p => ({ ...p, gpu: {
        ...p.gpu,
        webgpu: true,
        webgpuFeatures: Array.from(adapter.features || []),
        webgpuInfo: adapter.info ? JSON.stringify(adapter.info) : "adapter 정보 제한"
      }}));
    });

    await safeRun(async () => {
      if (!navigator.userAgentData?.getHighEntropyValues) return;
      const h = await navigator.userAgentData.getHighEntropyValues(["architecture", "bitness", "model", "platform", "platformVersion", "mobile", "wow64"]);
      patch(p => ({ ...p, cpu: {
        ...p.cpu,
        hintsSupported: true,
        architecture: h.architecture || null,
        bitness: h.bitness || null,
        platform: h.platform || navigator.platform || null,
        platformVersion: h.platformVersion || null,
        model: h.model || null,
        mobile: h.mobile,
        wow64: h.wow64
      }}));
    });

    await safeRun(async () => {
      if (!navigator.getBattery) return;
      const bat = await navigator.getBattery();
      const update = () => patch(p => ({
        ...p,
        battery: {
          supported: true,
          level: Math.round(bat.level * 100),
          charging: bat.charging,
          chargingTime: bat.chargingTime,
          dischargingTime: bat.dischargingTime
        }
      }));
      update();
      ["levelchange", "chargingchange", "chargingtimechange", "dischargingtimechange"].forEach(e => bat.addEventListener?.(e, update));
    });

    await safeRun(async () => {
      if (!navigator.storage?.persisted) return;
      const persisted = await navigator.storage.persisted();
      patch(p => ({ ...p, storage: { ...p.storage, persisted } }));
    });

    if (manual) notify("재스캔 완료");
  }, [addLog, notify, patch, scanDisplayBrowser]);

  const updateLive = useCallback(async () => {
    if (livePaused) return;
    safeRun(() => {
      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      patch(p => ({
        ...p,
        network: {
          ...p.network,
          supported: !!conn,
          online: navigator.onLine,
          downlink: conn?.downlink ?? null,
          rtt: conn?.rtt ?? null,
          type: conn?.effectiveType ?? null,
          saveData: conn?.saveData ?? null
        },
        memory: {
          ...p.memory,
          perfMemorySupported: !!performance.memory,
          usedJSHeapSize: performance.memory?.usedJSHeapSize || null,
          totalJSHeapSize: performance.memory?.totalJSHeapSize || null,
          jsHeapSizeLimit: performance.memory?.jsHeapSizeLimit || null
        }
      }));
      if (conn?.downlink !== undefined) setHistory(h => ({ ...h, net: [...h.net.slice(-59), conn.downlink || 0] }));
      if (performance.memory?.usedJSHeapSize) setHistory(h => ({ ...h, heap: [...h.heap.slice(-59), performance.memory.usedJSHeapSize / 1024 / 1024] }));
    });

    await safeRun(async () => {
      if (!navigator.storage?.estimate) return;
      const est = await navigator.storage.estimate();
      patch(p => ({ ...p, storage: { ...p.storage, supported: true, usage: est.usage ?? null, quota: est.quota ?? null } }));
    });

    safeRun(() => {
      const nav = performance.getEntriesByType("navigation")[0];
      const resources = performance.getEntriesByType("resource") || [];
      const topResources = resources
        .map(r => ({ name: r.name, type: r.initiatorType || "resource", duration: Math.round(r.duration || 0), transferSize: r.transferSize || 0 }))
        .sort((a, b) => b.duration - a.duration)
        .slice(0, 12);
      if (!nav) return;
      patch(p => ({ ...p, network: { ...p.network, timing: {
        load: nav.loadEventEnd ? nav.loadEventEnd - nav.startTime : null,
        dom: nav.domContentLoadedEventEnd ? nav.domContentLoadedEventEnd - nav.startTime : null,
        ttfb: nav.responseStart ? nav.responseStart - nav.requestStart : null,
        dns: nav.domainLookupEnd && nav.domainLookupStart ? nav.domainLookupEnd - nav.domainLookupStart : null,
        tcp: nav.connectEnd && nav.connectStart ? nav.connectEnd - nav.connectStart : null,
        tls: nav.secureConnectionStart ? nav.connectEnd - nav.secureConnectionStart : null,
        response: nav.responseEnd && nav.responseStart ? nav.responseEnd - nav.responseStart : null,
        resources: resources.length
      }, resources: topResources }}));
    });
  }, [patch, livePaused]);

  useEffect(() => {
    scanStatic(false);
    updateLive();
    const clockTimer = setInterval(() => setClock(now()), 1000);
    const liveTimer = setInterval(updateLive, 2500);
    const onResize = () => scanDisplayBrowser();
    addEventListener("resize", onResize);
    addEventListener("online", onResize);
    addEventListener("offline", onResize);
    return () => {
      clearInterval(clockTimer);
      clearInterval(liveTimer);
      removeEventListener("resize", onResize);
      removeEventListener("online", onResize);
      removeEventListener("offline", onResize);
    };
  }, [scanStatic, scanDisplayBrowser, updateLive]);

  useEffect(() => {
    let frames = 0, last = performance.now();
    const loop = (t) => {
      frames++;
      if (t - last >= 1000) {
        const fps = Math.round(frames * 1000 / (t - last));
        if (!livePausedRef.current) {
          patch(p => ({ ...p, runtime: { ...p.runtime, fps } }));
          setHistory(h => ({ ...h, fps: [...h.fps.slice(-59), fps] }));
        }
        frames = 0;
        last = t;
      }
      rafRef.current = requestAnimationFrame(loop);
    };
    rafRef.current = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafRef.current);
  }, [patch]);

  useEffect(() => {
    if (!("PerformanceObserver" in window)) return;
    let observer;
    try {
      observer = new PerformanceObserver((list) => {
        const total = list.getEntries().reduce((sum, e) => sum + e.duration, 0);
        if (total > 0 && !livePausedRef.current) {
          const ms = Math.round(total);
          patch(p => ({ ...p, runtime: { ...p.runtime, longTaskMs: ms } }));
          setHistory(h => ({ ...h, longTask: [...h.longTask.slice(-59), ms] }));
        }
      });
      observer.observe({ entryTypes: ["longtask"] });
    } catch {}
    return () => observer?.disconnect?.();
  }, [patch]);

  const togglePressure = useCallback(async () => {
    if (pressureObserverRef.current) {
      pressureObserverRef.current.disconnect?.();
      pressureObserverRef.current = null;
      patch(p => ({ ...p, cpu: { ...p.cpu, pressure: { ...p.cpu.pressure, active: false, note: "관찰 중지됨" } } }));
      return;
    }
    if (!("PressureObserver" in window)) {
      patch(p => ({ ...p, cpu: { ...p.cpu, pressure: { supported: false, active: false, state: null, source: null, time: now(), note: "Compute Pressure API 미지원" } } }));
      return;
    }
    try {
      const observer = new PressureObserver((records) => {
        const last = records[records.length - 1];
        patch(p => ({ ...p, cpu: { ...p.cpu, pressure: {
          supported: true, active: true, state: last.state, source: last.source, time: now(), note: "정확한 CPU 사용률(%)이 아니라 상태값입니다."
        } } }));
      });
      await observer.observe("cpu", { sampleInterval: 1000 });
      pressureObserverRef.current = observer;
      patch(p => ({ ...p, cpu: { ...p.cpu, pressure: { ...p.cpu.pressure, supported: true, active: true, note: "관찰 시작됨" } } }));
    } catch (e) {
      patch(p => ({ ...p, cpu: { ...p.cpu, pressure: { supported: false, active: false, state: null, source: null, time: now(), note: e?.message || "권한/브라우저 제한으로 측정 불가" } } }));
    }
  }, [patch]);

  const toggleStress = useCallback(() => {
    if (stressRef.current) {
      stressRef.current = false;
      patch(p => ({ ...p, runtime: { ...p.runtime, webLoad: null, opsPerSec: null } }));
      return;
    }
    stressRef.current = true;
    setHistory(h => ({ ...h, stress: [] }));
    const tick = () => {
      if (!stressRef.current) return;
      const start = performance.now();
      let ops = 0;
      while (performance.now() - start < 160) {
        Math.sqrt((ops * 9301 + 49297) % 233280);
        ops++;
      }
      const opsPerSec = Math.round(ops / 0.16);
      const webLoad = clamp(Math.round((opsPerSec / 4200000) * 100), 1, 100);
      patch(p => ({ ...p, runtime: { ...p.runtime, webLoad, opsPerSec } }));
      setHistory(h => ({ ...h, stress: [...h.stress.slice(-59), webLoad] }));
      setTimeout(tick, 350);
    };
    tick();
  }, [patch]);

  const runBenchmark = useCallback(async () => {
    setBenchUI({ running: true, progress: 0, step: "CPU Single" });
    await sleep(60);

    const cpuStart = performance.now();
    let c = 0;
    while (performance.now() - cpuStart < 520) { Math.sqrt((c * 1103515245 + 12345) & 0x7fffffff); c++; }
    const cpuSingle = Math.floor(c / 920);

    setBenchUI({ running: true, progress: 25, step: "Memory" });
    await sleep(60);

    const memStart = performance.now();
    const arr = new Float64Array(700000);
    for (let i = 0; i < arr.length; i++) arr[i] = i * 1.337;
    let sum = 0;
    for (let i = 0; i < arr.length; i += 7) sum += arr[i];
    const memory = Math.max(1, Math.floor(120000 / Math.max(performance.now() - memStart, 1)));

    setBenchUI({ running: true, progress: 50, step: "Storage" });
    await sleep(60);

    let storage = null;
    try {
      const s = performance.now();
      localStorage.setItem("__webz_bench__", "x".repeat(200000));
      localStorage.removeItem("__webz_bench__");
      storage = Math.max(1, Math.floor(30000 / Math.max(performance.now() - s, 1)));
    } catch {}

    setBenchUI({ running: true, progress: 75, step: "Network / Runtime" });
    await sleep(60);

    const cores = parseInt(data.cpu.cores || 1) || 1;
    const cpuMulti = Math.floor(cpuSingle * Math.min(cores, 8) * 0.72);
    const network = data.network.supported && data.network.downlink !== null
      ? Math.max(1, Math.floor((data.network.downlink * 110) - ((data.network.rtt || 0) * 0.45)))
      : null;
    const runtime = data.runtime.fps ? clamp(Math.round(data.runtime.fps * 2), 1, 200) : null;
    const parts = [cpuSingle, cpuMulti, memory, storage, network, runtime].filter(Number.isFinite);
    const overall = Math.round(parts.reduce((a, b) => a + b, 0) / Math.max(parts.length, 1));

    patch(p => ({ ...p, bench: { cpuSingle, cpuMulti, memory, storage, network, runtime, overall } }));
    setBenchUI({ running: false, progress: 100, step: "완료" });
    notify("벤치마크 완료");
  }, [data, notify, patch]);

  const runDownloadTest = useCallback(async () => {
    setDownload({ running: true, error: null, mbps: null, size: null, seconds: null, mode: "test-file" });
    const measure = async (url, mode) => {
      const start = performance.now();
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("download failed");
      const blob = await res.blob();
      const seconds = (performance.now() - start) / 1000;
      return { running: false, error: null, mbps: (blob.size * 8) / seconds / 1024 / 1024, size: blob.size, seconds, mode };
    };
    try {
      setDownload(await measure(`./speed-test-10mb.bin?cacheBust=${Date.now()}`, "speed-test-10mb.bin"));
    } catch {
      try {
        const result = await measure(`${location.href.split("#")[0]}?selfTest=${Date.now()}`, "self-html");
        setDownload({ ...result, error: "speed-test-10mb.bin 파일이 없어 현재 HTML 파일 기준으로 간이 측정했습니다." });
      } catch {
        setDownload({ running: false, error: "다운로드 속도 측정을 위해 같은 경로에 speed-test-10mb.bin 테스트 파일이 필요합니다.", mbps: null, size: null, seconds: null, mode: "failed" });
      }
    }
  }, []);

  const requestPersistentStorage = useCallback(async () => {
    if (!navigator.storage?.persist) {
      notify("Persistent Storage 미지원");
      return;
    }
    const ok = await safeRun(() => navigator.storage.persist(), false);
    patch(p => ({ ...p, storage: { ...p.storage, persisted: ok } }));
    notify(ok ? "영구 저장소 허용됨" : "영구 저장소 거부/불가");
  }, [notify, patch]);

  const copyReport = useCallback(async (mode = "text") => {
    if (!navigator.clipboard) {
      notify("Clipboard API 미지원");
      return;
    }
    const report = `Web-Z 진단 결과
- 측정 시각: ${new Date().toLocaleString()}
- 기기 유형: ${data.device.type}
- OS: ${data.device.os}
- 브라우저: ${data.device.browser}
- 보안 컨텍스트: ${window.isSecureContext ? "YES" : "NO"}
- CPU 논리 코어 수: ${val(data.cpu.cores)}
- CPU Pressure: ${data.cpu.pressure.state || data.cpu.pressure.note || "측정 전"}
- RAM 추정값: ${data.memory.deviceMemory ? data.memory.deviceMemory + " GB" : "미지원"}
- GPU Renderer: ${val(data.gpu.renderer)}
- WebGL2 지원: ${support(data.gpu.webgl2)}
- WebGPU 지원: ${support(data.gpu.webgpu)}
- 화면 해상도: ${screen.width}x${screen.height}
- DPR: ${devicePixelRatio}
- 온라인 여부: ${navigator.onLine ? "온라인" : "오프라인"}
- Network API 지원: ${support(data.network.supported)}
- Network downlink: ${data.network.downlink !== null ? data.network.downlink + " Mbps" : "API 미지원"}
- Battery API 지원: ${support(data.battery.supported)}
- Storage API 지원: ${support(data.storage.supported)}
- Storage 사용량: ${fmtBytes(data.storage.usage)}
- CPU Single Score: ${val(data.bench.cpuSingle, "측정 전")}
- CPU Multi Estimate: ${val(data.bench.cpuMulti, "측정 전")}
- Memory Score: ${val(data.bench.memory, "측정 전")}
- Storage Score: ${val(data.bench.storage, "N/A")}
- Network Score: ${val(data.bench.network, "N/A")}
- Runtime Score: ${val(data.bench.runtime, "N/A")}
- Overall Score: ${val(data.bench.overall, "측정 전")}
주의: 이 결과는 순수 브라우저 API와 웹 벤치마크 기반 참고값입니다.`;
    await navigator.clipboard.writeText(mode === "json" ? JSON.stringify(data, null, 2) : report);
    notify(mode === "json" ? "JSON 복사 완료" : "진단 결과 복사 완료");
  }, [data, notify]);

  const clearHistory = useCallback(() => {
    setHistory({ net: [], fps: [], heap: [], longTask: [], stress: [] });
    setLog([]);
    setDownload(null);
    notify("히스토리 초기화 완료");
  }, [notify]);

  const toggleLive = useCallback(() => {
    setLivePaused(v => !v);
  }, []);

  useEffect(() => {
    return () => {
      stressRef.current = false;
      pressureObserverRef.current?.disconnect?.();
      cancelAnimationFrame(rafRef.current);
    };
  }, []);

  return {
    data, clock, toast, log, history, download, benchUI, livePaused,
    scanStatic, togglePressure, toggleStress, runBenchmark, runDownloadTest,
    requestPersistentStorage, copyReport, clearHistory, toggleLive
  };
}

function App() {

    try {
      const saved = localStorage.getItem("webz-theme");
      if (saved) return saved === "dark";
    } catch {}
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  });
  const engine = useDiagnosticEngine();
  const { data: d, history, log, download, benchUI } = engine;

  useEffect(() => {
    document.body.classList.toggle("dark-mode", darkMode);
    try { localStorage.setItem("webz-theme", darkMode ? "dark" : "light"); } catch {}
  }, [darkMode]);

  const scoreMax = Math.max(
    d.bench.cpuSingle || 0, d.bench.cpuMulti || 0, d.bench.memory || 0,
    d.bench.storage || 0, d.bench.network || 0, d.bench.runtime || 0,
    d.bench.overall || 0, 100
  );

  const health = useMemo(() => {
    let score = 55;
    if (d.network.online) score += 8;
    if (d.gpu.webgl) score += 8;
    if (d.gpu.webgl2) score += 5;
    if (d.gpu.webgpu) score += 5;
    if (d.memory.deviceMemory) score += 5;
    if (d.runtime.fps >= 45) score += 8;
    if (d.runtime.longTaskMs > 100) score -= 8;
    if (d.bench.overall) score += Math.min(10, d.bench.overall / 60);
    return clamp(score, 0, 100);
  }, [d]);

  const storagePct = d.storage.quota ? clamp((d.storage.usage / d.storage.quota) * 100, 0, 100) : 0;
  const screenPreview = useMemo(() => {
    const w = d.display.width || screen.width || 1;
    const h = d.display.height || screen.height || 1;
    const ratio = w / h;

                <Bar label="Overall" value={d.bench.overall} max={scoreMax}/>
              </Section>

              {log.length > 0 && <Section title="Diagnostic log" desc="권한/브라우저 제한으로 실패한 일부 진단 기록입니다.">
                <Rows rows={log.map(x => [x.time, x.msg, "warn", true])}/>
              </Section>}
            </>
          )}

          {tab === "CPU" && (
            <>
              <Section title="CPU exposed by browser" desc="CPU-Z식 실제 CPU 정보가 아니라 브라우저가 제한적으로 노출하는 정보입니다."
                right={<Button onClick={engine.togglePressure}>{d.cpu.pressure.active ? "Pressure 중지" : "Pressure 시작"}</Button>}>
                <Rows rows={getRows.cpu(d)}/>
                {expert && <Row label="User Agent" value={navigator.userAgent} badge="raw" wrap/>}
              </Section>

              <Section title="CPU pressure / usage substitute" desc="정확한 CPU 사용률(%)은 순수 웹에서 접근 불가입니다. 지원 브라우저에서는 Compute Pressure 상태값을 보여주고, 미지원 시 아래 웹 부하 테스트로 대체합니다.">
                <div className="grid md:grid-cols-3 gap-3 mb-3">
                  <Stat label="Pressure state" value={d.cpu.pressure.state || "측정 전"} sub={d.cpu.pressure.note} badge={d.cpu.pressure.state ? "warn" : "idle"}/>
                  <Stat label="Web stress ops/s" value={d.runtime.opsPerSec ? d.runtime.opsPerSec.toLocaleString() : "대기"} sub="현재 페이지 반복 연산 기준" badge={d.runtime.webLoad ? "warn" : "idle"}/>
                  <Stat label="Load estimate" value={d.runtime.webLoad ? `${d.runtime.webLoad}%` : "대기"} sub="진짜 CPU 사용률이 아닌 웹 부하 추정" badge={d.runtime.webLoad ? "est" : "idle"}/>
                </div>
                <Button onClick={engine.toggleStress} danger={!!d.runtime.webLoad}>{d.runtime.webLoad ? "부하 테스트 중지" : "웹 부하 테스트 시작"}</Button>
              </Section>

              <Section title="CPU-Z style unavailable fields" desc="아래 정보는 브라우저 보안 정책상 순수 웹에서 직접 읽을 수 없습니다.">
                <Rows rows={["정확한 CPU 모델명", "실시간 CPU 클럭", "CPU 전압", "CPU 온도", "L1/L2/L3 캐시", "스테핑", "TDP", "메인보드 칩셋", "팬 속도", "OS 프로세스 목록", "프로세스별 CPU 사용률"].map(x => [x, "순수 웹에서 접근 불가", "no"])}/>
              </Section>
            </>
          )}

          {tab === "Memory" && (
            <>
              <Section title="Memory and JS heap" desc="브라우저가 실제로 제공하는 메모리 정보만 표시합니다. RAM 값은 실제 하드웨어 용량이 아니라 추정값입니다.">
                <Rows rows={getRows.memory(d)}/>
              </Section>
              <LineGraph history={history.heap} label="JS heap used history" unit="MB"/>
            </>
          )}

          {tab === "GPU" && (
            <>
              <Section title="WebGL / WebGPU" desc="GPU 상세 정보는 브라우저가 개인정보 보호 목적으로 숨길 수 있습니다.">
                <Rows rows={getRows.gpu(d)}/>
                {expert && <Row label="WebGPU features" value={d.gpu.webgpuFeatures.length ? d.gpu.webgpuFeatures.join(", ") : "N/A"} badge={d.gpu.webgpuFeatures.length ? "raw" : "no"} wrap/>}
              </Section>
              {expert && <Section title="WebGL extensions" desc="브라우저가 노출하는 WebGL 확장 목록입니다.">
                <div className="flex flex-wrap gap-2">
                  {(d.gpu.extensions || []).slice(0, 80).map(ext => <span key={ext} className="text-[9px] mono bg-[#010409] border border-white/[0.06] rounded-lg px-2 py-1 text-slate-400">{ext}</span>)}
                  {!d.gpu.extensions?.length && <p className="text-xs text-slate-500">확장 목록 없음</p>}
                </div>
              </Section>}
            </>
          )}

          {tab === "Network" && (
            <>
              <Section title="Network information" desc="Network Information API 미지원 시 0Mbps가 아니라 API 미지원으로 표시합니다."
                right={<Button onClick={engine.runDownloadTest}>다운로드 테스트</Button>}>
                <Rows rows={getRows.network(d)}/>
              </Section>

              {download && <Section title="Download test result">
                {download.running && <p className="text-sm font-bold text-blue-300">측정 중...</p>}
                {download.error && <p className="text-xs text-amber-300 leading-relaxed mb-3">{download.error}</p>}
                {download.mbps && <Rows rows={[
                  ["Speed", `${download.mbps.toFixed(2)} Mbps`, "est"],
                  ["Size", fmtBytes(download.size), "raw"],
                  ["Duration", `${download.seconds.toFixed(2)} s`, "raw"],
                  ["Mode", download.mode, "raw"]
                ]}/>}
              </Section>}

              <div className="grid lg:grid-cols-2 gap-4">
                <Section title="Navigation timing">
                  <Bar label="DNS" value={d.network.timing.dns} max={Math.max(d.network.timing.load || 100, 100)} suffix="ms"/>
                  <Bar label="TCP" value={d.network.timing.tcp} max={Math.max(d.network.timing.load || 100, 100)} suffix="ms"/>
                  <Bar label="TLS" value={d.network.timing.tls} max={Math.max(d.network.timing.load || 100, 100)} suffix="ms"/>
                  <Bar label="TTFB" value={d.network.timing.ttfb} max={Math.max(d.network.timing.load || 100, 100)} suffix="ms"/>
                  <Bar label="Response" value={d.network.timing.response} max={Math.max(d.network.timing.load || 100, 100)} suffix="ms"/>
                  <Bar label="DOMContentLoaded" value={d.network.timing.dom} max={Math.max(d.network.timing.load || 100, 100)} suffix="ms"/>
                  <Bar label="Full load" value={d.network.timing.load} max={Math.max(d.network.timing.load || 100, 100)} suffix="ms"/>
                  <Row label="Resource count" value={d.network.timing.resources ?? "측정 전"} badge={d.network.timing.resources !== null ? "raw" : "idle"}/>
                </Section>
                <LineGraph history={history.net} label="Network downlink history" unit="Mbps"/>
              </div>

              <Section title="Web resource monitor" desc="OS 프로세스 목록은 읽을 수 없으므로, 현재 페이지의 리소스 로딩 목록을 작업 관리자처럼 표시합니다.">
                <ResourceTable resources={d.network.resources}/>
              </Section>
            </>
          )}

          {tab === "Display" && (
            <div className="grid lg:grid-cols-[1fr_300px] gap-4">
              <Section title="Display metrics"><Rows rows={getRows.display(d)}/></Section>
              <Section title="Screen ratio preview" desc="현재 화면 비율을 단순 시각화한 미리보기입니다.">
                <div className="h-60 flex items-center justify-center">
                  <div className="bg-blue-600/20 border-2 border-blue-500 rounded-xl shadow-lg shadow-blue-600/10" style={{ width: screenPreview.width, height: screenPreview.height }}/>
                </div>
                <p className="text-center mono text-xs text-slate-400">{d.display.width} × {d.display.height}</p>
              </Section>
            </div>
          )}

          {tab === "Browser" && (
            <>
              <Section title="Browser / OS"><Rows rows={getRows.browser(d)}/></Section>
              <Section title="Web API support matrix"><FeatureGrid data={d}/></Section>
              <Section title="Excluded scope" desc="제작 범위를 줄이기 위해 아래 영역은 제외했습니다.">
                <p className="text-xs text-slate-400 leading-relaxed">{APP.excluded}</p>
              </Section>
            </>
          )}

          {tab === "Storage" && (
            <Section title="Storage estimate" desc="현재 사이트 기준 저장공간 사용량입니다. 전체 디스크 용량이 아닙니다."
              right={<Button onClick={engine.requestPersistentStorage}>영구 저장소 요청</Button>}>
              <Rows rows={[
                ["Storage API", support(d.storage.supported), d.storage.supported ? "ok" : "no"],
                ["Usage", d.storage.usage !== null ? fmtBytes(d.storage.usage) : "측정 불가", d.storage.usage !== null ? "raw" : "no"],
                ["Quota", d.storage.quota !== null ? fmtBytes(d.storage.quota) : "측정 불가", d.storage.quota !== null ? "raw" : "no"],
                ["Persisted", d.storage.persisted === null ? "측정 전" : String(d.storage.persisted), d.storage.persisted ? "ok" : "idle"],
                ["Storage Score", d.bench.storage || "측정 전", d.bench.storage ? "est" : "idle"]
              ]}/>
              <div className="mt-5">
                <div className="flex justify-between text-[10px] text-slate-500 font-bold mb-1"><span>USAGE</span><span>{storagePct.toFixed(2)}%</span></div>
                <div className="w-full bg-[#010409] h-2 rounded-full overflow-hidden border border-white/[0.05]">
                  <div className="bg-blue-600 h-full transition-all duration-700" style={{ width: `${storagePct}%` }}/>
                </div>
              </div>
            </Section>
          )}

          {tab === "Battery" && (
            <Section title="Battery status" desc="Battery API는 브라우저 지원 차이가 큽니다. 미지원 시 0%로 표시하지 않습니다.">
              {!d.battery.supported ? (
                <div className="p-8 text-center">
                  <div className="text-4xl font-black text-slate-600 mb-2">N/A</div>
                  <p className="text-xs text-slate-500 font-bold">Battery API 지원 안 됨</p>
                </div>
              ) : (
                <>
                  <div className="text-center py-6">
                    <div className="text-7xl font-black text-white glow-blue mono leading-none">{d.battery.level}%</div>
                    <p className="text-xs text-slate-500 font-bold mt-2">{d.battery.charging ? "Connected / Charging" : "Discharging"}</p>
                  </div>
                  <Rows rows={[
                    ["Charging time", fmtSec(d.battery.chargingTime), "raw"],
                    ["Discharging time", fmtSec(d.battery.dischargingTime), "raw"]
                  ]}/>
                </>
              )}
            </Section>
          )}

          {tab === "Runtime" && (
            <>
              <div className="grid md:grid-cols-4 gap-3">
                <Stat label="FPS" value={d.runtime.fps ?? "측정 중"} sub="requestAnimationFrame 기준" badge={d.runtime.fps ? "est" : "idle"}/>
                <Stat label="Long Task" value={`${d.runtime.longTaskMs}ms`} sub="최근 긴 작업 총량" badge={d.runtime.longTaskMs > 80 ? "warn" : "ok"}/>
                <Stat label="JS Heap" value={fmtBytes(d.memory.usedJSHeapSize)} sub="지원 브라우저 한정" badge={d.memory.usedJSHeapSize ? "raw" : "no"}/>
                <Stat label="Web Load" value={d.runtime.webLoad ? `${d.runtime.webLoad}%` : "대기"} sub="진짜 CPU 사용률 아님" badge={d.runtime.webLoad ? "est" : "idle"}/>
              </div>
              <Section title="Runtime controls" desc={`현재 페이지 기준 부하 테스트입니다. OS 전체 CPU 사용률이 아닙니다. 라이브 모니터: ${engine.livePaused ? "일시정지" : "실행 중"}`}>
                <Button onClick={engine.toggleStress} danger={!!d.runtime.webLoad}>{d.runtime.webLoad ? "부하 테스트 중지" : "웹 부하 테스트 시작"}</Button>
                <div className="grid md:grid-cols-2 gap-3 mt-4">
                  <Row label="ops/s" value={d.runtime.opsPerSec ? d.runtime.opsPerSec.toLocaleString() : "대기"} badge={d.runtime.opsPerSec ? "est" : "idle"}/>
                  <Row label="load estimate" value={d.runtime.webLoad ? `${d.runtime.webLoad}%` : "대기"} badge={d.runtime.webLoad ? "est" : "idle"}/>
                </div>
              </Section>
              <LineGraph history={history.fps} label="FPS history" unit="fps"/>
              <LineGraph history={history.longTask} label="Long task history" unit="ms"/>
              <LineGraph history={history.heap} label="JS heap history" unit="MB"/>
              <LineGraph history={history.stress} label="Web stress estimate" unit="%"/>
              <Section title="Runtime explanation">
                <p className="text-xs text-slate-400 leading-relaxed">
                  순수 웹에서는 작업 관리자처럼 OS 전체 CPU 사용률, 프로세스 목록, 프로세스별 메모리 사용량을 읽을 수 없습니다.
                  대신 이 탭은 현재 웹페이지 기준 FPS, Long Task, JS Heap, 웹 부하 테스트를 보여줍니다.
                </p>
              </Section>
            </>
          )}

          {tab === "Benchmark" && (
            <Section title="Benchmark Pro" desc="브라우저 환경에서 가능한 간단한 성능 측정입니다. 절대 성능 기준이 아니라 비교 참고용입니다."
              right={<Button onClick={engine.runBenchmark} disabled={benchUI.running}>Run Diagnostic</Button>}>
              <div className="text-center py-5">
                <p className="text-[9px] text-blue-500 font-black uppercase tracking-[0.4em] mb-2">Overall score</p>
                <div className="text-8xl font-black text-white glow-blue mono tracking-tighter">{benchUI.running ? "..." : (d.bench.overall ?? "READY")}</div>
                {benchUI.running && <p className="mt-3 text-xs text-slate-500 font-bold">{benchUI.step} / {benchUI.progress}%</p>}
              </div>
              <Bar label="Progress" value={benchUI.progress} max={100} suffix="%"/>
              <Bar label="CPU Single Score" value={d.bench.cpuSingle} max={scoreMax}/>
              <Bar label="CPU Multi Estimate" value={d.bench.cpuMulti} max={scoreMax}/>
              <Bar label="Memory Score" value={d.bench.memory} max={scoreMax}/>
              <Bar label="Storage Score" value={d.bench.storage} max={scoreMax}/>
              <Bar label="Network Score" value={d.bench.network} max={scoreMax}/>
              <Bar label="Runtime Score" value={d.bench.runtime} max={scoreMax}/>
              <Bar label="Overall Score" value={d.bench.overall} max={scoreMax}/>
              <div className="flex gap-2 flex-wrap mt-4">
                <Button onClick={() => engine.copyReport("text")}>진단 결과 복사</Button>
                <Button onClick={() => engine.copyReport("json")}>JSON 복사</Button>
              </div>
            </Section>
          )}
        </div>

        <footer className="mt-12 opacity-20 text-[8px] font-black uppercase tracking-[.8em] text-center pb-12 italic">
          {APP.footer}
        </footer>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary>
    <App/>
  </ErrorBoundary>
);
</script>
</body>
</html>
